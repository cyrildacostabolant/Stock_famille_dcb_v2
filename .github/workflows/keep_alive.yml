name: Supabase Keep Alive

on:
  schedule:
    # S'exécute tous les jours à 05:00 UTC
    - cron: '0 5 * * *'
  workflow_dispatch: # Pour lancer un test manuel

jobs:
  ping_supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Stocks Table
        run: |
          curl --fail -i -X GET "https://dtglujrdhetwahbutzgv.supabase.co/rest/v1/stocks?select=id&limit=1" \
          -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"
